<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>NMA Pro Test Runner</title>
    <style>
        body { font-family: Consolas, monospace; padding: 20px; background: #111827; color: #e5e7eb; }
        h1 { color: #93c5fd; margin: 0 0 16px 0; }
        .summary { background: #1f2937; border: 1px solid #374151; padding: 12px; border-radius: 8px; margin-bottom: 14px; }
        #log { white-space: pre-wrap; line-height: 1.6; }
        .pass { color: #86efac; }
        .fail { color: #fca5a5; }
        .warn { color: #fcd34d; }
        .info { color: #93c5fd; }
        iframe { width: 100%; height: 720px; border: 1px solid #374151; margin-top: 16px; border-radius: 8px; background: #0b1020; }
    </style>
</head>
<body>
    <h1>NMA Pro v8.0 - Automated Test Suite</h1>
    <div class="summary" id="summary">Running tests...</div>
    <div id="log"></div>
    <iframe id="app"></iframe>

    <script>
        const log = document.getElementById('log');
        const summary = document.getElementById('summary');
        const iframe = document.getElementById('app');
        const results = { passed: [], failed: [], warnings: [] };

        function logMsg(msg, type = 'info') {
            const line = document.createElement('div');
            line.className = type;
            line.textContent = msg;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;
        }

        function logPass(name) {
            results.passed.push(name);
            logMsg(`  [PASS] ${name}`, 'pass');
        }

        function logFail(name, err) {
            results.failed.push({ name, err: String(err) });
            logMsg(`  [FAIL] ${name}: ${err}`, 'fail');
        }

        function logWarn(name, msg) {
            results.warnings.push({ name, msg: String(msg) });
            logMsg(`  [WARN] ${name}: ${msg}`, 'warn');
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function waitForApp(win, timeout = 20000) {
            const start = Date.now();
            while (Date.now() - start < timeout) {
                if (win && win.AppState && typeof win.runAnalysis === 'function' && typeof win.renderStudyTable === 'function') {
                    return true;
                }
                await sleep(100);
            }
            return false;
        }

        async function waitForLoading(win, timeout = 30000) {
            const start = Date.now();
            while (Date.now() - start < timeout) {
                const overlay = win.document.getElementById('loadingOverlay');
                if (!overlay || overlay.getAttribute('aria-hidden') === 'true') {
                    return true;
                }
                await sleep(100);
            }
            return false;
        }

        function hasContent(el) {
            if (!el) return false;
            return el.childElementCount > 0 || (el.innerHTML || '').trim().length > 20;
        }

        async function clickTab(doc, tabId) {
            const btn = doc.querySelector(`[data-tab="${tabId}"]`);
            if (!btn) return false;
            btn.click();
            await sleep(250);
            return true;
        }

        const TEST_DATA = [
            { name: 'Study 1', treatment1: 'A', events1: 12, n1: 120, treatment2: 'B', events2: 18, n2: 118, year: 2018, rob: 'low', meanAge: 61, propMale: 0.52, dose1: 10, dose2: 20 },
            { name: 'Study 2', treatment1: 'A', events1: 15, n1: 150, treatment2: 'C', events2: 20, n2: 152, year: 2019, rob: 'some', meanAge: 63, propMale: 0.49, dose1: 10, dose2: 30 },
            { name: 'Study 3', treatment1: 'A', events1: 10, n1: 110, treatment2: 'D', events2: 24, n2: 112, year: 2020, rob: 'high', meanAge: 59, propMale: 0.55, dose1: 10, dose2: 40 },
            { name: 'Study 4', treatment1: 'B', events1: 16, n1: 135, treatment2: 'C', events2: 14, n2: 132, year: 2021, rob: 'low', meanAge: 60, propMale: 0.50, dose1: 20, dose2: 30 },
            { name: 'Study 5', treatment1: 'B', events1: 20, n1: 140, treatment2: 'D', events2: 26, n2: 142, year: 2022, rob: 'some', meanAge: 64, propMale: 0.47, dose1: 20, dose2: 40 },
            { name: 'Study 6', treatment1: 'C', events1: 11, n1: 128, treatment2: 'D', events2: 17, n2: 130, year: 2023, rob: 'low', meanAge: 62, propMale: 0.53, dose1: 30, dose2: 40 }
        ];

        async function runButtonTest(ctx, cfg) {
            const { win, doc } = ctx;
            const { id, name, tab, prepare, check, allowAlertPattern } = cfg;
            try {
                if (tab) {
                    const tabOk = await clickTab(doc, tab);
                    if (!tabOk) {
                        logFail(name, `Tab not found: ${tab}`);
                        return;
                    }
                }

                const btn = doc.getElementById(id);
                if (!btn) {
                    logFail(name, `Button not found: #${id}`);
                    return;
                }

                if (typeof prepare === 'function') {
                    await prepare(win, doc);
                }

                let alertMsg = null;
                const origAlert = win.alert;
                win.alert = (msg) => { alertMsg = String(msg || ''); };

                btn.click();
                await waitForLoading(win, 25000);
                await sleep(400);

                win.alert = origAlert;

                if (alertMsg) {
                    if (allowAlertPattern && allowAlertPattern.test(alertMsg)) {
                        logWarn(name, alertMsg);
                    } else {
                        logFail(name, alertMsg);
                        return;
                    }
                }

                if (typeof check === 'function') {
                    const ok = check(win, doc);
                    if (!ok) {
                        logFail(name, 'Post-check failed');
                        return;
                    }
                }

                logPass(name);
            } catch (err) {
                logFail(name, err.message || err);
            }
        }

        async function runTests() {
            logMsg('================================================================', 'info');
            logMsg('NMA Pro v8.0 - Comprehensive Test Suite', 'info');
            logMsg('================================================================\n', 'info');

            const appPath = 'nma-pro-v8.0.html';
            logMsg(`Loading app: ${appPath}`, 'info');
            iframe.src = appPath;

            await sleep(1500);

            const win = iframe.contentWindow;
            const doc = iframe.contentDocument;
            const ctx = { win, doc };

            if (!await waitForApp(win)) {
                logFail('App initialization', 'Timed out waiting for AppState/runAnalysis');
                return updateSummary();
            }
            logPass('App initialization');

            logMsg('\n[1] Data setup...', 'info');
            try {
                win.AppState.studies = TEST_DATA.map(s => ({ ...s }));
                win.renderStudyTable();
                if (win.AppState.studies.length === TEST_DATA.length) {
                    logPass(`Loaded ${TEST_DATA.length} studies`);
                } else {
                    logFail('Data setup', 'Study count mismatch');
                }
            } catch (err) {
                logFail('Data setup', err.message || err);
            }

            logMsg('\n[2] Main analysis...', 'info');
            try {
                const runBtn = doc.getElementById('runAnalysisBtn');
                if (!runBtn) throw new Error('runAnalysisBtn missing');
                runBtn.click();
                await waitForLoading(win, 30000);
                await sleep(500);

                if (!win.AppState.results) throw new Error('No AppState.results');
                logPass('Main NMA analysis');

                const het = win.AppState.results.heterogeneity;
                if (het && Number.isFinite(het.tau2) && Number.isFinite(het.I2)) {
                    logPass(`Heterogeneity (tau2=${het.tau2.toFixed(4)}, I2=${het.I2.toFixed(1)}%)`);
                } else {
                    logFail('Heterogeneity output', 'Missing or non-numeric tau2/I2');
                }

                if (Array.isArray(win.AppState.ranking) && win.AppState.ranking.length > 0) {
                    logPass('Treatment ranking');
                } else {
                    logFail('Treatment ranking', 'Missing AppState.ranking');
                }

                if (Number.isFinite(win.AppState.rankingSeed) && win.AppState.rankingSeed > 0) {
                    logPass(`Ranking seed (${win.AppState.rankingSeed})`);
                } else {
                    logFail('Ranking seed', 'Missing or invalid AppState.rankingSeed');
                }

                if (Array.isArray(win.AppState.ranking) && Number.isFinite(win.AppState.ranking.nSim) && win.AppState.ranking.nSim >= 200) {
                    logPass(`Ranking simulations (${win.AppState.ranking.nSim})`);
                } else {
                    logFail('Ranking simulations', 'Missing or invalid ranking.nSim');
                }

                const snapRanking = JSON.stringify((win.AppState.ranking || []).map(r => ({
                    treatment: r.treatment,
                    rank: r.rank,
                    pScore: Number(r.pScore.toFixed(8)),
                    meanRank: Number(r.meanRank.toFixed(8))
                })));
                runBtn.click();
                await waitForLoading(win, 30000);
                await sleep(500);
                const rerunRanking = JSON.stringify((win.AppState.ranking || []).map(r => ({
                    treatment: r.treatment,
                    rank: r.rank,
                    pScore: Number(r.pScore.toFixed(8)),
                    meanRank: Number(r.meanRank.toFixed(8))
                })));
                if (snapRanking === rerunRanking) {
                    logPass('Deterministic ranking reproducibility');
                } else {
                    logFail('Deterministic ranking reproducibility', 'Ranking changed between identical reruns');
                }
            } catch (err) {
                logFail('Main analysis', err.message || err);
            }

            logMsg('\n[3] Visualization smoke tests...', 'info');
            [
                ['networkPlot', 'Network plot'],
                ['forestPlot', 'Forest plot'],
                ['leagueTableContainer', 'League table'],
                ['rankogramPlot', 'Rankogram'],
                ['rankProbMatrixContainer', 'Rank probability matrix']
            ].forEach(([id, name]) => {
                const el = doc.getElementById(id);
                if (hasContent(el)) logPass(name);
                else logFail(name, 'Empty/not rendered');
            });

            logMsg('\n[4] Analytical modules...', 'info');
            const moduleTests = [
                {
                    id: 'runBayesianBtn',
                    name: 'Bayesian NMA',
                    tab: 'bayesian',
                    prepare: (_w, d) => {
                        const nIter = d.getElementById('bayesNIter');
                        const burnin = d.getElementById('bayesBurnin');
                        const thin = d.getElementById('bayesThin');
                        if (nIter) nIter.value = '800';
                        if (burnin) burnin.value = '200';
                        if (thin) thin.value = '2';
                    },
                    check: (w) => !!w.AppState.bayesianResults
                },
                {
                    id: 'runPubBiasBtn',
                    name: 'Publication Bias Suite',
                    tab: 'pubbias',
                    check: (w, d) => !!w.AppState.pubBiasResults && hasContent(d.getElementById('pubBiasResults'))
                },
                {
                    id: 'runMetaRegBtn',
                    name: 'Meta-regression',
                    tab: 'metareg',
                    prepare: (_w, d) => {
                        const sel = d.getElementById('covariate1Select');
                        if (sel) sel.value = 'year';
                    },
                    check: (w) => !!w.AppState.metaRegResults && w.AppState.metaRegResults.applicable !== false
                },
                {
                    id: 'runSubgroupBtn',
                    name: 'Subgroup analysis',
                    tab: 'metareg',
                    prepare: (_w, d) => {
                        const sel = d.getElementById('categoricalCovariateSelect');
                        if (sel) sel.value = 'rob';
                    },
                    check: (w) => !!w.AppState.subgroupResults,
                    allowAlertPattern: /(insufficient|not applicable)/i
                },
                {
                    id: 'runCSTREAMBtn',
                    name: 'C-STREAM',
                    tab: 'transportability',
                    check: (w) => !!w.AppState.cstreamResults
                },
                {
                    id: 'runCumulativeBtn',
                    name: 'Cumulative NMA',
                    tab: 'cumulative',
                    check: (w) => !!w.AppState.cumulativeResults
                },
                {
                    id: 'runDoseBtn',
                    name: 'Dose-response',
                    tab: 'doseresponse',
                    prepare: (_w, d) => {
                        const sel = d.getElementById('doseModelSelect');
                        if (sel) sel.value = 'emax';
                    },
                    check: (w) => !!w.AppState.doseResponseResults,
                    allowAlertPattern: /(requires dose data|not applicable|insufficient)/i
                },
                {
                    id: 'runLeaveOneOutBtn',
                    name: 'Leave-one-out sensitivity',
                    tab: 'sensitivity',
                    check: (w) => !!w.AppState.leaveOneOutResults
                },
                {
                    id: 'runValidationBtn',
                    name: 'R validation report',
                    tab: 'validation',
                    check: (_w, d) => {
                        const out = d.getElementById('validationResults');
                        if (!out) return false;
                        const text = (out.textContent || '');
                        return /Arm-swap invariance/i.test(text) && /Ranking reproducibility \\(seeded\\)/i.test(text);
                    }
                }
            ];

            for (const t of moduleTests) {
                await runButtonTest(ctx, t);
            }

            logMsg('\n[5] Tab navigation and export controls...', 'info');
            const tabs = ['data', 'guardian', 'network', 'results', 'ranking', 'heterogeneity', 'consistency', 'advanced', 'export'];
            for (const tab of tabs) {
                const ok = await clickTab(doc, tab);
                if (ok) logPass(`Tab: ${tab}`);
                else logFail(`Tab: ${tab}`, 'Missing tab button');
            }

            ['exportJsonBtn', 'exportCsvBtn', 'exportRCodeBtn', 'exportPythonBtn', 'generateReportBtn'].forEach(id => {
                const el = doc.getElementById(id);
                if (el) logPass(`Control: ${id}`);
                else logFail(`Control: ${id}`, 'Missing');
            });

            updateSummary();
        }

        function updateSummary() {
            const failed = results.failed.length;
            const passed = results.passed.length;
            const warned = results.warnings.length;
            const total = passed + failed;
            const passRate = total > 0 ? ((passed / total) * 100).toFixed(1) : '0.0';

            summary.innerHTML = `
                <h3 style="margin:0 0 8px 0">Test Results</h3>
                <div>Total: ${total} | <span class="pass">Passed: ${passed}</span> | <span class="fail">Failed: ${failed}</span> | <span class="warn">Warnings: ${warned}</span></div>
                <div>Pass Rate: ${passRate}%</div>
            `;

            logMsg('\n================================================================', 'info');
            logMsg('TEST SUMMARY', 'info');
            logMsg('================================================================', 'info');
            logMsg(`Passed: ${passed} | Failed: ${failed} | Warnings: ${warned}`, 'info');

            if (failed > 0) {
                logMsg('\nFailed tests:', 'fail');
                results.failed.forEach(f => logMsg(`  - ${f.name}: ${f.err}`, 'fail'));
            }

            if (warned > 0) {
                logMsg('\nWarnings:', 'warn');
                results.warnings.forEach(w => logMsg(`  - ${w.name}: ${w.msg}`, 'warn'));
            }

            localStorage.setItem('nmaProV8TestResults', JSON.stringify(results));
        }

        window.onload = () => setTimeout(runTests, 600);
    </script>
</body>
</html>
